<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>鸣潮攻略站 · 万象声骸</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2333;
      --bg-card: #1a1f2b;
      --border: #252d3a;
      --border-active: #4a5568;
      --text-primary: #e6edf3;
      --text-secondary: #a1b0c2;
      --text-muted: #6b7d93;
      --accent: #c9a84c;
      --accent-glow: #e8c860;
      --blue: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --purple: #a371f7;
      --orange: #d2991d;
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.45);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 6px;
      --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
      --sidebar-width: 400px;
      --topbar-height: 52px;
      --bottombar-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 8px; }
    .app { display: flex; height: 100%; }

    /* 移动端顶栏 */
    .topbar { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--topbar-height); background: var(--bg-secondary); border-bottom: 1px solid var(--border); align-items: center; padding: 0 12px; gap: 10px; }
    .topbar .logo { font-weight: 700; font-size: 17px; background: linear-gradient(135deg, var(--accent-glow), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar .search-mini { flex: 1; height: 36px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); padding: 0 14px; font-size: 13px; outline: none; }

    /* 侧边栏 */
    .sidebar { width: var(--sidebar-width); min-width: var(--sidebar-width); height: 100%; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 500; }
    .sidebar-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 22px; background: linear-gradient(135deg, var(--accent-glow), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-header .sub { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; }
    .sidebar-search { padding: 12px 16px; }
    .sidebar-search input { width: 100%; height: 42px; border-radius: 21px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); padding: 0 16px; font-size: 13px; outline: none; }
    .tab-nav { display: flex; gap: 4px; padding: 6px 14px; background: var(--bg-tertiary); margin: 0 14px; border-radius: 12px; }
    .tab-nav button { flex: 1; padding: 8px 4px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 11px; transition: all 0.2s; }
    .tab-nav button.active { background: var(--bg-card); color: var(--accent-glow); box-shadow: var(--shadow-sm); }
    .panel-content { flex: 1; overflow-y: auto; padding: 12px 16px 20px; }
    .panel-content.hidden { display: none; }

    /* 组件样式 */
    .blog-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 14px; cursor: pointer; transition: all 0.2s; }
    .blog-card:hover { border-color: var(--accent); }
    .blog-card h3 { font-size: 15px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .blog-card p { font-size: 12px; color: var(--text-muted); line-height: 1.7; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; }
    .tag-new { background: rgba(201,168,76,0.25); color: var(--accent-glow); }
    .tag-hot { background: rgba(248,81,73,0.2); color: var(--red); }
    .tag-guide { background: rgba(88,166,255,0.2); color: var(--blue); }

    .article-detail { padding: 8px 4px; }
    .article-detail h2 { font-size: 18px; margin: 16px 0 8px; color: var(--accent-glow); }
    .article-detail p { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 12px; }
    .article-detail .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
    .article-detail .stat-item { background: var(--bg-tertiary); padding: 10px; border-radius: 8px; font-size: 12px; }
    .article-detail .stat-item strong { color: var(--accent-glow); display: block; font-size: 16px; }

    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; background: #1a1d24; }
    .map-ctrl { position: absolute; top: 12px; right: 12px; z-index: 600; display: flex; flex-direction: column; gap: 6px; }
    .map-ctrl button { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; font-size: 16px; }
    .exploration-stats { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 600; background: var(--bg-secondary); border-radius: 20px; padding: 8px 16px; display: flex; gap: 16px; font-size: 11px; font-weight: 600; white-space: nowrap; box-shadow: var(--shadow-lg); }
    .exploration-stats .val { color: var(--accent-glow); font-size: 15px; font-weight: 700; }

    /* 弹窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; }
    .modal-sheet { width: 100%; max-width: 500px; max-height: 80vh; background: var(--bg-secondary); border-radius: 20px 20px 0 0; padding: 12px 20px 24px; overflow-y: auto; box-shadow: var(--shadow-lg); }
    .modal-sheet .grabber { width: 40px; height: 4px; background: var(--border-active); border-radius: 2px; margin: 0 auto 14px; }

    .btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-primary); cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-fill { background: var(--accent); color: #000; border-color: var(--accent); }
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--bg-card); border: 1px solid var(--accent); padding: 10px 24px; border-radius: 24px; font-size: 13px; font-weight: 600; pointer-events: none; display: none; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar { display: flex; }
      .map-container { padding-top: var(--topbar-height); padding-bottom: 70px; }
      .mobile-bottom { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottombar-height); background: var(--bg-secondary); border-top: 1px solid var(--border); z-index: 1000; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); }
      .mobile-bottom .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; color: var(--text-muted); font-size: 10px; }
      .mobile-bottom .nav-item.active { color: var(--accent-glow); }
      .mobile-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1600; max-height: 65vh; background: var(--bg-secondary); border-radius: 20px 20px 0 0; overflow-y: auto; padding: 12px 16px 24px; box-shadow: var(--shadow-lg); }
      .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1500; background: rgba(0,0,0,0.5); }
    }
    @media (min-width: 769px) { .mobile-bottom, .mobile-overlay, .mobile-panel { display: none !important; } }
  </style>
</head>
<body>
  <div class="app">
    <!-- 移动顶栏 -->
    <div class="topbar">
      <span class="logo">🌊 鸣潮攻略站</span>
      <input type="text" class="search-mini" id="searchMini" placeholder="搜索攻略、角色、任务...">
    </div>

    <!-- 桌面侧边栏 -->
    <div class="sidebar" id="sidebar">

        <button data-tab="blog" class="active">📰 攻略文章</button>
        <button data-tab="map">🗺️ 交互地图</button>
        <button data-tab="tasks">📋 任务列表</button>
        <button data-tab="resources">💎 资源查询</button>
      </div>
      <!-- 攻略文章面板 -->
      <div class="panel-content" id="panelBlog"></div>
      <!-- 地图筛选面板 -->
      <div class="panel-content hidden" id="panelMap">
        <div style="font-size:12px;color:var(--text-muted);">📍 点击右侧地图标记查看详情</div>
        <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);" id="explorationDetail"></div>
      </div>
      <!-- 任务面板 -->
      <div class="panel-content hidden" id="panelTasks"><div id="taskListContainer"></div></div>
      <!-- 资源面板 -->
      <div class="panel-content hidden" id="panelResources"><div id="resourceListContainer"></div></div>
    </div>

    <!-- 地图区域 -->
    <div class="map-container">
      <div id="map"></div>
      <div class="map-ctrl">
        <button id="btnZoomIn">＋</button><button id="btnZoomOut">－</button><button id="btnReset">🏠</button>
      </div>
      <div class="exploration-stats"><span>📍 点位 <span class="val" id="statTotal">0</span></span><span>✅ 已收集 <span class="val" id="statCollected">0</span></span><span>📊 <span class="val" id="statPercent">0%</span></span></div>
    </div>
  </div>

  <!-- 移动底部导航 -->
  <div class="mobile-bottom" id="mobileBottom">
    <div class="nav-item active" data-nav="blog">📰 攻略</div>
    <div class="nav-item" data-nav="map">🗺️ 地图</div>
    <div class="nav-item" data-nav="tasks">📋 任务</div>
    <div class="nav-item" data-nav="resources">💎 资源</div>
  </div>
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <div class="mobile-panel" id="mobilePanel"><div class="grabber"></div><div id="mobilePanelContent"></div></div>

  <!-- 点位与文章弹窗 -->

    <div class="modal-sheet" id="modalSheet"><div class="grabber"></div><div id="modalContent"></div></div>
  </div>
  <div class="toast" id="toast"></div>

          <p><strong>② 绯雪平民霜渐队：</strong>绯雪 + 千咲 + 琳奈。绯雪主C爆发冻结，千咲提供聚怪与减抗，琳奈奶拐聚一体。无琳奈可用鉴心或折枝替代，无千咲可用莫宁或维里奈作为下位替代。[reference:1]</p>
          <p><strong>③ 聚爆铁三角：</strong>爱弥斯（主C）+ 达妮娅（专辅/副C）+ 千咲（减抗/续航）。达妮娅开启泡泡领域聚怪控场，叠加集谐层数提供高额热熔与聚爆增伤，千咲高频挂减抗保障输出拉满。[reference:2]</p>
          <p><strong>④ 西格莉卡气动标配队：</strong>西格莉卡 + 仇远 + 治疗位（维里奈/白芷）。仇远延奏为西格莉卡叠加气动增伤，西格莉卡释放声骸技能主打核心爆发。[reference:3]</p>
        `},
        { id:'a3', title:'新手开局角色推荐', tag:'guide', icon:'🌟', summary:'凛音、白芷、散华——3位最容易获取且好用的新手机制解析。', content:`
          <h2>🌟 新手开局角色推荐</h2>
          <p>新手开局的核心原则：操作简单、生存能力强、开荒效率高。无需追求强度天花板，前期资源集中砸向1-2个主力。[reference:4]</p>
          <p><strong>Top1：凛音（初始赠送，远程输出+轻微辅助）</strong>——操作最简单，技能自带护盾与闪避反击，清怪效率高，新手零翻车率。[reference:5]</p>
          <p><strong>Top2：白芷（剧情初期获取，T0级治疗辅助）</strong>——提供稳定群体治疗，大招开启后全队提升20%攻击力（持续12秒），5命还能解锁复活队友能力，全阶段必练。[reference:6]</p>
          <p><strong>Top3：散华（维里奈/守岸人替代品）</strong>——零氪微氪最优解，适配绝大多数开荒场景，能快速成型队伍、降低副本难度。[reference:7]</p>
        `},
        { id:'a4', title:'新手入坑全流程指南', tag:'guide', icon:'📖', summary:'从1级到满级：主线推进策略、世界等级注意事项、每日必做。', content:`
          <h2>📖 新手入坑全流程指南</h2>
          <p><strong>主线推进策略：</strong>8级前全程跟随主线；8-14级卡主线时转向危行任务、伴星任务和地图探索；14级后提升数据坞等级获取高品质声骸。[reference:8][reference:9]</p>
          <p><strong>关键注意事项：</strong>①任务优先级牢记——潮汐主线 > 道引任务 > 伴星任务 > 危行任务 > 纪闻任务 > 限时活动；②世界等级每10级自动升，20/40/60级需打试炼突破，打不过可手动降级；③常规体力结晶波片上限240（6分钟回1点），优先刷角色/武器突破材料、技能材料，每周3次周本必打。[reference:10]</p>
          <p><strong>养成顺序：</strong>角色等级 > 武器等级 > 技能等级 > 声骸。主C优先拉满90级，标配队伍：主C+副C+辅助+奶妈。[reference:11]</p>
        `},
        { id:'a5', title:'声骸系统入门到毕业', tag:'guide', icon:'🎵', summary:'套装搭配、词条优先级、刷取路线以及主C/辅助毕业面板参考。', content:`
          <h2>🎵 声骸系统入门到毕业</h2>
          <p><strong>基础认知：</strong>声骸=套装装备+宠物技能，打怪随机掉落。分绿蓝紫金四档，数据坞等级越高金色概率越大。新手前期别追求完美词条，有啥用啥。[reference:12]</p>
          <p><strong>主C通用搭配：3+2</strong>方案——分别获取C3（主词条：对应属性伤害加成×2）和C1（主词条：攻击百分比×2）部位套装即可。毕业分配固定43311。</p>
          <p><strong>辅助通用：</strong>不绝余音两件套（大量角色可适用），治疗位可用隐世回光套（4C可选生命/攻击/防御/治疗量提升）。[reference:13]</p>
          <p><strong>词条优先级：</strong>双暴 > 攻击力百分比 > 共鸣效率。暴击率建议70%+，暴击伤害260%+，共鸣效率120%-130%。</p>
        `},
        { id:'a6', title:'全角色突破材料速查', tag:'guide', icon:'📦', summary:'绯雪、琳奈、赞妮、布兰特等常用角色突破材料的BOSS位置。', content:`
          <h2>📦 全角色突破材料速查</h2>
          <p><strong>绯雪（冷凝主C）：</strong>赤铃兰（罗伊冰原采集）、觊日者的指尖（BOSS海维夏掉落，罗伊冰原·联运椎骨左下方）。</p>
          <p><strong>琳奈（泛用辅助）：</strong>霜信花（罗伊冰原·星炬学院上方传送点附近采集）、海蚀碎晶（衍射属性技能材料，罗伊冰原大量分布）。[reference:14]</p>
          <p><strong>赞妮：</strong>白金机心（BOSS异构武装掉落）、剑菖蒲（拉古那城内/埃格拉镇外侧采集）、聚方声核系列（轰鸣种/静默种残象掉落）。[reference:15]</p>
          <p><strong>布兰特：</strong>焚磷厄骨（叹息古龙掉落，黎那汐塔·悲叹墓岛）、金羊毛（船首祭地采集/商店购买）。[reference:16]</p>
          <p><strong>夏空：</strong>突破材料焚磷厄骨（叹息古龙）、采集物金羊毛（悲叹墓岛采集/药剂商店购买）。[reference:17]</p>
        `},
        { id:'a7', title:'今州城/七丘地图收集攻略', tag:'guide', icon:'🗺️', summary:'今州城25个宝箱分布、声匣全点位坐标。', content:`
          <h2>🗺️ 今州城/七丘地图收集攻略</h2>
          <p><strong>今州城收集数据：</strong>共计25个宝箱（北部中曲台地）、5个声匣（中部地区）、宝箱26-41（东南区域）、2个声匣（南部区域）。收集全部声匣可兑换游戏奖励。[reference:18]</p>
          <p><strong>声匣收集口诀：</strong>抬头看天，低头看地，再找机关！每个地图过任务时注意左上角地图，宝箱图标就是声匣，到了图标位置没看见就按口诀排查。[reference:19]</p>
          <p><strong>七丘地区收集：</strong>需准备魔术先生声骸、热海黄梨披萨。星星=声匣，钻石=包括红名在内的地上宝箱（不包括围墙内）。[reference:20]</p>
        `},
      ];

      // ==================== 状态管理 ====================
      let markerStatus = {};
      let mapInstance, markerGroup;
      let currentArticle = null;

      function loadStatus() {
        try { const s = localStorage.getItem('ww_status_v2'); if (s) markerStatus = JSON.parse(s); } catch(e) { markerStatus = {}; }
      }
      function saveStatus() { try { localStorage.setItem('ww_status_v2', JSON.stringify(markerStatus)); } catch(e) {} }
      function getStatus(id) { return markerStatus[id] || 'undiscovered'; }
      function setStatus(id, st) { markerStatus[id] = st; saveStatus(); renderMarkers(); updateStats(); }

      // ==================== 地图初始化 ====================
      function initMap() {
        mapInstance = L.map('map', { center: mapCenter, zoom: defaultZoom, zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 18, subdomains: 'abcd' }).addTo(mapInstance);
        markerGroup = L.layerGroup().addTo(mapInstance);
        renderMarkers();
        updateStats();
      }

      function renderMarkers() {
        if (!markerGroup) return;
        markerGroup.clearLayers();
        const colors = { teleport:'#58a6ff', chest:'#e8c860', collectible:'#a371f7', elite:'#f85149', resource:'#3fb950', npc:'#d2991d' };
        const icons = { teleport:'🌀', chest:'🎁', collectible:'✨', elite:'👾', resource:'🌿', npc:'❕' };
        allPoints.forEach(pt => {
          const st = getStatus(pt.id);
          const isCol = st === 'collected';
          const col = colors[pt.type] || '#ccc';
          const html = `<div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:${col}33;border:2px solid ${isCol ? '#aaa' : col};${isCol ? 'opacity:0.5;filter:grayscale(40%);' : ''}">${icons[pt.type]||'📍'}</div>`;
          const icon = L.divIcon({ className:'', html, iconSize:[26,26], iconAnchor:[13,13] });
          const m = L.marker([pt.lat, pt.lng], { icon }).addTo(markerGroup);
          m.on('click', () => openPointDetail(pt));
        });
      }

      function updateStats() {
        const total = allPoints.length;
        let collected = 0;
        allPoints.forEach(pt => { if (getStatus(pt.id) === 'collected') collected++; });
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statCollected').textContent = collected;
        document.getElementById('statPercent').textContent = total > 0 ? Math.round((collected / total) * 100) + '%' : '0%';
      }

      // ==================== 弹窗系统 ====================
      function openModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }
      function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.body.style.overflow = '';
        currentArticle = null;
      }
      document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

      function openPointDetail(pt) {
        const st = getStatus(pt.id);
        const labels = { undiscovered:'未发现', marked:'已标记', collected:'已收集' };
        let html = `<div class="article-detail"><h2>${pt.name}</h2><p>📍 (${pt.lat.toFixed(3)}, ${pt.lng.toFixed(3)}) | ${pt.area} | ${pt.layer}</p><p>${pt.desc || ''}</p>`;
        if (pt.rewards) html += `<p>🎁 奖励：${pt.rewards.join('、')}</p>`;
        html += `<p>状态：${labels[st]}</p><div style="display:flex;gap:8px;margin-top:8px;"><button class="btn" onclick="window._setPtStatus('${pt.id}','undiscovered')">未发现</button><button class="btn" onclick="window._setPtStatus('${pt.id}','marked')">已标记</button><button class="btn btn-fill" onclick="window._setPtStatus('${pt.id}','collected')">已收集</button></div></div>`;
        openModal(html);
      }
      window._setPtStatus = (id, st) => { setStatus(id, st); closeModal(); showToast(`已更新为 ${({undiscovered:'未发现',marked:'已标记',collected:'已收集'})[st]}`); };

      function openArticle(article) {
        currentArticle = article;
        let html = `<div class="article-detail"><h2>${article.icon} ${article.title}</h2>${article.content}</div>`;
        openModal(html);
      }

      // ==================== Toast ====================
      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
      }

      // ==================== 渲染列表 ====================
      function renderBlogList() {
        document.getElementById('panelBlog').innerHTML = articles.map(a => `
          <div class="blog-card" onclick="window._openArticle('${a.id}')">
            <h3>${a.icon} ${a.title} <span class="tag tag-${a.tag === 'hot' ? 'hot' : a.tag === 'guide' ? 'guide' : 'new'}">${a.tag === 'hot' ? '热门' : a.tag === 'guide' ? '指南' : '新版'}</span></h3>
            <p>${a.summary}</p>
          </div>
        `).join('');
      }
      window._openArticle = (id) => {
        const a = articles.find(x => x.id === id);
        if (a) openArticle(a);
      };

      function renderTasks() {
        document.getElementById('taskListContainer').innerHTML = tasksData.map(t => `
          <div class="blog-card" onclick="${t.coords ? `mapInstance.setView([${t.coords[0]},${t.coords[1]}],15)` : ''}">
            <h3>${t.order < 20 ? `[${t.order}] ` : ''}${t.name} <span class="tag tag-guide">${t.type==='story'?'主线':t.type==='side'?'支线':'日常'}</span></h3>
            <p>📍 ${t.area} | 👤 ${t.npc}</p><p>🎁 ${t.rewards}</p><p style="color:var(--text-muted);">${t.desc}</p>
          </div>
        `).join('');
      }

      function renderResources() {
        document.getElementById('resourceListContainer').innerHTML = resourcesData.map(r => `
          <div class="blog-card" onclick="mapInstance.setView([${r.coords[0]},${r.coords[1]}],15)">
            <h3>${r.icon} ${r.name} <span class="tag tag-new">${r.cat}</span></h3>
            <p>${r.desc} · ${r.area}</p>
          </div>
        `).join('');
      }

      // ==================== 搜索 ====================
      function search(q) {
        if (!q || !q.trim()) return;
        const kw = q.trim().toLowerCase();
        // 搜索文章
        const fa = articles.find(a => a.title.toLowerCase().includes(kw) || a.summary.toLowerCase().includes(kw));
        if (fa) { openArticle(fa); return; }
        // 搜索点位
        const fp = allPoints.find(p => p.name.toLowerCase().includes(kw));
        if (fp) { mapInstance.setView([fp.lat, fp.lng], 15); setTimeout(() => openPointDetail(fp), 300); return; }
        showToast('未找到匹配结果');
      }
      document.getElementById('searchDesktop').addEventListener('keydown', e => { if (e.key === 'Enter') { search(e.target.value); e.target.value = ''; } });
      document.getElementById('searchMini').addEventListener('keydown', e => { if (e.key === 'Enter') { search(e.target.value); e.target.value = ''; } });

      // ==================== 标签页切换 ====================
      let activeTab = 'blog';
      document.getElementById('tabNav').addEventListener('click', e => {
        const btn = e.target.closest('button');
        if (!btn) return;
        document.querySelectorAll('#tabNav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        document.getElementById('panelBlog').classList.toggle('hidden', activeTab !== 'blog');
        document.getElementById('panelMap').classList.toggle('hidden', activeTab !== 'map');
        document.getElementById('panelTasks').classList.toggle('hidden', activeTab !== 'tasks');
        document.getElementById('panelResources').classList.toggle('hidden', activeTab !== 'resources');
        if (activeTab === 'tasks') renderTasks();
        if (activeTab === 'resources') renderResources();
      });

      // ==================== 地图控件 ====================
      document.getElementById('btnZoomIn').addEventListener('click', () => mapInstance.zoomIn());
      document.getElementById('btnZoomOut').addEventListener('click', () => mapInstance.zoomOut());
      document.getElementById('btnReset').addEventListener('click', () => mapInstance.setView(mapCenter, defaultZoom));

      // ==================== 移动端适配 ====================
      function showMobilePanel(html) {
        document.getElementById('mobilePanelContent').innerHTML = html;
        document.getElementById('mobileOverlay').style.display = 'block';
        document.getElementById('mobilePanel').style.display = 'block';
      }
      function hideMobilePanel() {
        document.getElementById('mobileOverlay').style.display = 'none';
        document.getElementById('mobilePanel').style.display = 'none';
      }
      document.getElementById('mobileOverlay').addEventListener('click', hideMobilePanel);
      document.getElementById('mobileBottom').addEventListener('click', e => {
        const nav = e.target.closest('.nav-item');
        if (!nav) return;
        document.querySelectorAll('#mobileBottom .nav-item').forEach(n => n.classList.remove('active'));
        nav.classList.add('active');
        const key = nav.dataset.nav;
        if (key === 'blog') { showMobilePanel(`<h3 style="margin-bottom:10px;">📰 攻略文章</h3>${document.getElementById('panelBlog').innerHTML}`); }
        else if (key === 'map') { hideMobilePanel(); }
        else if (key === 'tasks') { renderTasks(); showMobilePanel(`<h3 style="margin-bottom:10px;">📋 任务列表</h3>${document.getElementById('taskListContainer').innerHTML}`); }
        else if (key === 'resources') { renderResources(); showMobilePanel(`<h3 style="margin-bottom:10px;">💎 资源查询</h3>${document.getElementById('resourceListContainer').innerHTML}`); }
      });

      // ==================== 启动 ====================
      function init() {
        loadStatus();
        initMap();
        renderBlogList();
        renderTasks();
        renderResources();
        console.log('🌊 鸣潮攻略站已就绪 · 3.3版本 · 角色强度/配队/入坑攻略全部内置');
      }
      document.addEventListener('DOMContentLoaded', init);
      window.addEventListener('resize', () => { if (mapInstance) setTimeout(() => mapInstance.invalidateSize(), 100); });
    })();
  </script>
</body>
</html>
